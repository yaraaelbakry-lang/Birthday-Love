<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Love</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #d7fff2, #f3fffb);
      color: #21423c;
      text-align: center;
    }

    header {
      padding: 60px 20px 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #0f9f8c;
    }

    .english-line {
      font-size: 18px;
      color: #315f57;
      max-width: 750px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .card {
      background: white;
      width: 85%;
      max-width: 750px;
      margin: 25px auto;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(15, 159, 140, 0.18);
    }

    h2 {
      color: #21423c;
    }

    .message {
      font-size: 24px;
      line-height: 1.8;
      color: #0b6b5f;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .counter {
      margin-top: 15px;
      color: #6b7c78;
      font-size: 15px;
    }

    button {
      background: #12b8a6;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px 0;
    }

    button:hover {
      background: #0f9f8c;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .empty {
      padding: 25px;
      border: 2px dashed #12b8a6;
      border-radius: 18px;
      color: #0f9f8c;
      background: #effffb;
    }

    .all-messages {
      display: none;
      text-align: right;
      margin-top: 20px;
      max-height: 350px;
      overflow-y: auto;
      background: #f4fffb;
      border-radius: 18px;
      padding: 15px;
      border: 1px solid #bff5ea;
    }

    .all-messages p {
      margin: 10px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #d9fff3;
      color: #315f57;
      line-height: 1.6;
    }

    footer {
      padding: 30px;
      font-size: 15px;
      color: #6b7c78;
    }
  </style>
</head>

<body>

  <header>
    <h1>كل سنة وإنت حبيبي ❤️</h1>
    <p class="english-line" dir="ltr">
      I’m trying to make every day of your life a little more beautiful, just like you do with mine.
    </p>
  </header>

  <section class="card">
    <h2>رسالة النهارده 💌</h2>
    <div class="message" id="dailyMessage" dir="auto"></div>
    <div class="counter" id="dayCounter"></div>

    <button onclick="showTodayMessage()">اعرض رسالة النهارده</button>
    <button onclick="toggleAllMessages()">اعرض كل الرسايل</button>

    <div class="all-messages" id="allMessages"></div>
  </section>

  <section class="card">
    <h2>صورنا 📸</h2>

    <div class="gallery" id="gallery"></div>

    <div class="empty" id="emptyPhotos">
      لسه هنضيف الصور هنا في الخطوة الجاية ❤️
    </div>
  </section>

  <footer>
    ❤️ Made with love
  </footer>

  <script>
    const startDate = "2026-07-07";
    const totalMessages = 380;

    /*
      لما ترفعي الصور على GitHub في فولدر اسمه photos،
      حطي أسماءها هنا بالشكل ده:

      const photos = [
        "photos/photo1.jpg",
        "photos/photo2.jpg",
        "photos/photo3.jpg"
      ];
    */
    const photos = [];

    const fixedMessages = [
      "كل سنة وإنت حبيبي، my favorite person and my safest place ❤️",
      "I love you in a way that feels calm, warm, and forever.",
      "وجودك في حياتي بيخلّي كل حاجة أحن وأجمل.",
      "You are my happy thought in the middle of any hard day.",
      "بحبك مش بس عشان أنت حبيبي، بحبك عشان أنت بيتي.",
      "Every little thing about you makes my heart smile.",
      "إنت أجمل عادة في يومي، وأحلى جزء في حياتي.",
      "I hope life gives you softness, joy, and everything your heart deserves.",
      "بحاول أخلي يومك أحلى، زي ما إنت بتخلي حياتي كلها أحلى.",
      "You are not just loved, you are deeply treasured.",
      "قلبي بيختارك كل يوم من غير ما يفكر مرتين.",
      "Loving you feels like finding peace in a noisy world.",
      "إنت الشخص اللي وجوده بيطمن قلبي من غير مجهود.",
      "I’m so proud of you, of your heart, your effort, and your soul.",
      "معاك حتى الأيام العادية بتبقى special.",
      "You make love feel easy, gentle, and real.",
      "بحب ضحكتك، صوتك، طريقتك، وكل حاجة فيك.",
      "My favorite place will always be wherever you are.",
      "إنت مش مجرد شخص في حياتي، إنت أجمل جزء فيها.",
      "I love you more than yesterday and less than all our tomorrows.",
      "ربنا يخليك ليا، يا أحن قلب وأجمل روح.",
      "You make my world softer just by being in it.",
      "وجودك جنبي بيخليني أحس إن كل حاجة هتبقى تمام.",
      "You are my comfort person, my safe thought, my favorite feeling.",
      "بحبك بطريقة هادية بس عميقة جدًا.",
      "I hope you always see yourself the way I see you: precious.",
      "إنت الحتة الحلوة اللي في كل يوم.",
      "You deserve love that feels like sunshine and peace.",
      "أنا ممتنة ليك، لوجودك، وللحب اللي بينا.",
      "You are my today, my tomorrow, and my favorite forever.",
      "بحب إنك أنت، بكل تفاصيلك وبكل عفويتك.",
      "Your smile is honestly one of my favorite things in this life.",
      "إنت نعمة بحاول أحافظ عليها بكل حب.",
      "I don’t need perfect days, I just need you in them.",
      "كل مرة أكلمك بحس إن قلبي رجع مكانه.",
      "You make ordinary moments feel like memories.",
      "بحبك قد كل الحاجات اللي معرفتش أقولها.",
      "I hope your heart feels loved today, because it really is.",
      "إنت دايمًا السبب في أحن ضحكة عندي.",
      "You are my favorite notification, my favorite voice, my favorite person.",
      "وجودك في حياتي مش عادي، وجودك نعمة.",
      "I love the way you make my heart feel safe.",
      "إنت الشخص اللي الدنيا بتحلى بيه.",
      "I’m lucky to love you, and even luckier to be loved by you.",
      "بحبك في هدوئك، في هزارك، في تعبك، وفي كل حالاتك.",
      "You are the softest part of my life.",
      "كل يوم معاك بيخليني أتأكد إنك اختياري الصح.",
      "I hope today treats you as kindly as your heart treats people.",
      "بحبك حب كبير، بس قلبي دايمًا حاسه أكبر من الكلام.",
      "You are the love I prayed for without even knowing."
    ];

    const arabicParts = [
      "إنت أجمل حاجة حصلت في حياتي.",
      "وجودك بيخلّي يومي أهدى وألطف.",
      "بحب تفاصيلك الصغيرة قبل الكبيرة.",
      "إنت دايمًا أقرب حد لقلبي.",
      "ضحكتك كفاية تغيّر مود يومي كله.",
      "معاك بحس إن الدنيا أبسط وأحن.",
      "إنت الشخص اللي قلبي بيرتاحله.",
      "أنا فخورة بيك وبكل حاجة فيك.",
      "وجودك جنبي بيخلّي كل حاجة أسهل.",
      "بحبك بطريقة مش محتاجة شرح.",
      "إنت حبيبي وصاحبي وأماني.",
      "كل يوم بحس إني محظوظة بيك أكتر.",
      "إنت دايمًا فكرتي الحلوة.",
      "قربك بيدّي قلبي طمأنينة.",
      "بحب إنك في حياتي بالشكل ده.",
      "إنت أكتر شخص بيفرق معايا.",
      "كل لحظة معاك بتبقى غالية عندي.",
      "إنت السبب في ضحكتي من قلبي.",
      "بحب وجودك حتى في أبسط اللحظات.",
      "إنت أجمل اختيار اختاره قلبي.",
      "معاك بحس إني في مكاني الصح.",
      "إنت نعمة كبيرة في حياتي.",
      "بحبك في كل حالاتك.",
      "إنت أحن قلب عرفته.",
      "كل يوم معاك ليه معنى مختلف.",
      "إنت اللي بتخلي الحياة أخف.",
      "أنا ممتنة لوجودك أكتر مما تتخيل.",
      "إنت أجمل جزء في أيامي.",
      "بحبك حب هادي ودافي.",
      "إنت دايمًا الشخص اللي قلبي يختاره."
    ];

    const englishParts = [
      "You are my safe place and my favorite feeling.",
      "You make my heart feel calm and loved.",
      "I’m grateful for you every single day.",
      "You make life softer just by being here.",
      "You are my favorite part of every day.",
      "I love you more than words can ever explain.",
      "You are the peace I never knew I needed.",
      "Your love feels like home to me.",
      "You make ordinary days feel magical.",
      "I hope you always feel how loved you are.",
      "You are my sweetest thought and warmest comfort.",
      "I’m proud of you in ways I can’t fully say.",
      "You deserve the gentlest kind of happiness.",
      "Being loved by you is my favorite blessing.",
      "You make my world brighter without even trying.",
      "My heart chooses you again and again.",
      "You are deeply loved, deeply valued, and deeply missed.",
      "You are the kind of person poems are written about.",
      "I hope your day is as beautiful as your soul.",
      "You are my calm in every storm.",
      "You make love feel honest and easy.",
      "I love the way your existence makes mine better.",
      "You are my favorite hello and my hardest goodbye.",
      "You deserve all the love you give to everyone else.",
      "My heart feels lighter whenever I think of you.",
      "You are my little piece of forever.",
      "I love you quietly, loudly, deeply, and endlessly.",
      "You make my life feel warmer.",
      "You are a blessing I never want to take for granted.",
      "I hope today hugs your heart gently."
    ];

    const closings = [
      "Forever yours ❤️",
      "Always and always ❤️",
      "With all my heart ❤️",
      "My love, my home ❤️",
      "You are my favorite forever ❤️",
      "Sending you all my love today ❤️",
      "I love you endlessly ❤️",
      "You mean the world to me ❤️",
      "My heart is always with you ❤️",
      "You will always be my person ❤️"
    ];

    function buildMessages() {
      const allMessages = [...fixedMessages];
      let i = 0;

      while (allMessages.length < totalMessages) {
        const arabic = arabicParts[i % arabicParts.length];
        const english = englishParts[(i * 7 + 3) % englishParts.length];
        const closing = closings[(i * 5 + 1) % closings.length];

        allMessages.push(arabic + " " + english + " " + closing);
        i++;
      }

      return allMessages.slice(0, totalMessages);
    }

    const messages = buildMessages();

    function makeLocalDate(dateText) {
      const parts = dateText.split("-");
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function showTodayMessage() {
      const oneDay = 1000 * 60 * 60 * 24;
      const today = new Date();
      const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const start = makeLocalDate(startDate);

      const differenceInDays = Math.floor((todayOnly - start) / oneDay);

      if (differenceInDays < 0) {
        const daysLeft = Math.abs(differenceInDays);
        document.getElementById("dailyMessage").innerText =
          "أول رسالة هتبدأ يوم 7 يوليو 2026 💌";
        document.getElementById("dayCounter").innerText =
          "باقي " + daysLeft + " يوم على بداية الرسائل";
        return;
      }

      let dayNumber = differenceInDays + 1;

      if (dayNumber > totalMessages) {
        dayNumber = totalMessages;
      }

      document.getElementById("dailyMessage").innerText = messages[dayNumber - 1];
      document.getElementById("dayCounter").innerText =
        "اليوم رقم " + dayNumber + " من " + totalMessages;
    }

    function toggleAllMessages() {
      const allMessagesDiv = document.getElementById("allMessages");

      if (allMessagesDiv.style.display === "block") {
        allMessagesDiv.style.display = "none";
        return;
      }

      allMessagesDiv.innerHTML = "";

      messages.forEach((message, index) => {
        const p = document.createElement("p");
        p.dir = "auto";
        p.innerText = "Day " + (index + 1) + ": " + message;
        allMessagesDiv.appendChild(p);
      });

      allMessagesDiv.style.display = "block";
    }

    function loadPhotos() {
      const gallery = document.getElementById("gallery");
      const emptyPhotos = document.getElementById("emptyPhotos");

      gallery.innerHTML = "";

      if (photos.length === 0) {
        emptyPhotos.style.display = "block";
        return;
      }

      emptyPhotos.style.display = "none";

      photos.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo;
        img.alt = "صورة من ذكرياتنا";
        gallery.appendChild(img);
      });
    }

    showTodayMessage();
    loadPhotos();
  </script>

</body>
</html>
