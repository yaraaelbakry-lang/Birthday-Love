<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Love</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #d9fff3, #f4fffb);
      color: #21423c;
      text-align: center;
    }

    header {
      padding: 60px 20px 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #0f9f8c;
    }

    .english-line {
      font-size: 18px;
      color: #315f57;
      max-width: 750px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .card {
      background: white;
      width: 85%;
      max-width: 750px;
      margin: 25px auto;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(15, 159, 140, 0.18);
    }

    h2 {
      color: #21423c;
    }

    .message {
      font-size: 24px;
      line-height: 1.8;
      color: #0b6b5f;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter {
      margin-top: 15px;
      color: #6b7c78;
      font-size: 15px;
    }

    button {
      background: #12b8a6;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px 0;
    }

    button:hover {
      background: #0f9f8c;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .empty {
      padding: 25px;
      border: 2px dashed #12b8a6;
      border-radius: 18px;
      color: #0f9f8c;
      background: #effffb;
    }

    .all-messages {
      display: none;
      text-align: right;
      margin-top: 20px;
      max-height: 350px;
      overflow-y: auto;
      background: #f4fffb;
      border-radius: 18px;
      padding: 15px;
      border: 1px solid #bff5ea;
    }

    .all-messages p {
      margin: 10px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #d9fff3;
      color: #315f57;
      line-height: 1.6;
    }

    footer {
      padding: 30px;
      font-size: 15px;
      color: #6b7c78;
    }
  </style>
</head>

<body>

  <header>
    <h1>كل سنة وإنت حبيبي ❤️</h1>
    <p class="english-line" dir="ltr">
      I’m trying to make every day of your life a little more beautiful, just like you do with mine.
    </p>
  </header>

  <section class="card">
    <h2>رسالة النهارده 💌</h2>
    <div class="message" id="dailyMessage"></div>
    <div class="counter" id="dayCounter"></div>

    <button onclick="showTodayMessage()">اعرض رسالة النهارده</button>
    <button onclick="toggleAllMessages()">اعرض كل الرسايل</button>

    <div class="all-messages" id="allMessages"></div>
  </section>

  <section class="card">
    <h2>صورنا 📸</h2>

    <div class="gallery" id="gallery"></div>

    <div class="empty" id="emptyPhotos">
      لسه هنضيف الصور هنا في الخطوة الجاية ❤️
    </div>
  </section>

  <footer>
    ❤️ Made with love
  </footer>

  <script>
    /*
      تاريخ بداية الرسائل:
      الرسالة رقم 1 هتظهر يوم 7 يوليو 2026
    */
    const startDate = "2026-07-07";

    /*
      هنا هنضيف الصور بعد ما نرفعها على GitHub.
      مثال:
      const photos = [
        "photos/photo1.jpg",
        "photos/photo2.jpg",
        "photos/photo3.jpg"
      ];
    */
    const photos = [];

    /*
      لو عايزة تبعتيلي رسايل معينة، هنحطها هنا.
      حاليًا سايبينها فاضية، والكود هيستخدم الرسايل الجاهزة تحت.
    */
    const customMessages = [];

    const messageStarts = [
      "وجودك في حياتي أجمل صدفة حصلتلي.",
      "كل يوم معاك بيأكدلي إن الحب حقيقي.",
      "ابتسامتك بتخلي أي يوم أحلى.",
      "إنت الأمان اللي قلبي اختاره.",
      "بحب تفاصيلك الصغيرة قبل الكبيرة.",
      "صوتك لوحده كفاية يطمن قلبي.",
      "معاك الدنيا بتبقى أهدى وأجمل.",
      "إنت الشخص اللي بحمد ربنا عليه كل يوم.",
      "قربك نعمة مش عادية.",
      "بحبك بطريقة أكبر من الكلام.",
      "كل ذكرى بينا ليها مكان خاص في قلبي.",
      "إنت مش بس حبيبي، إنت صاحبي وبيتي.",
      "وجودك بيخليني أقوى وأسعد.",
      "أنا محظوظة بيك أكتر مما تتخيل.",
      "كل مرة أشوفك قلبي يفرح من جديد.",
      "إنت أجمل جزء في أيامي.",
      "بحب ضحكتك وكلامك وحنانك.",
      "معاك بحس إن كل حاجة ممكنة.",
      "إنت حتة من قلبي مش شبه حد.",
      "حبك مخلي الحياة ألطف.",
      "أنا فخورة بيك وبكل حاجة فيك.",
      "إنت دايمًا سبب راحتي.",
      "بحب إنك أنت، بكل بساطة.",
      "كل يوم بيعدي بحبك أكتر.",
      "وجودك جنبي أجمل هدية.",
      "إنت الحكاية اللي بحب أعيشها كل يوم.",
      "بحس معاك إن قلبي في مكانه الصح.",
      "أنت الشخص اللي بيهون عليا كل حاجة.",
      "بحب اهتمامك حتى في أبسط التفاصيل.",
      "في عيني، إنت دايمًا مميز.",
      "إنت أجمل دعوة ربنا استجابها.",
      "معاك اللحظات العادية بتبقى مميزة.",
      "بحبك في هدوئك وفي جنانك.",
      "إنت السبب ورا أجمل ضحكة عندي.",
      "قلبك من أحن القلوب اللي عرفتها.",
      "أنا ممتنة لكل لحظة جمعتني بيك.",
      "إنت نصيبي الحلو.",
      "حبك بيكبر جوايا كل يوم.",
      "إنت دايمًا أقرب حد لقلبي.",
      "معاك بحس إني مش لوحدي أبدًا.",
      "إنت فرحتي المفضلة.",
      "وجودك بيخليني أحب الحياة أكتر.",
      "إنت الشخص اللي نفسي أفضل أحبه العمر كله.",
      "بحب طريقة وجودك في حياتي.",
      "أيامي بيك أحلى وأحن.",
      "إنت معنى الحب بالنسبالي.",
      "قلبي اختارك ولسه بيختارك كل يوم.",
      "بحبك حب هادي وعميق وجميل.",
      "إنت أجمل من كل الكلام اللي ممكن أقوله.",
      "معاك كل حاجة ليها طعم تاني.",
      "إنت الشخص اللي بيفرق معايا دايمًا.",
      "ضحكتك عندي بالدنيا.",
      "كل سنة وإنت أقرب لقلبي.",
      "بحبك قد كل اللحظات الحلوة بينا.",
      "إنت أجمل بداية وأحلى استمرار.",
      "قربك بيريح روحي.",
      "إنت الحلم اللي بقي حقيقة.",
      "بحب إننا إحنا.",
      "وجودك بيكمل أيامي.",
      "إنت أكتر حد بحب أطمن عليه.",
      "أنا بحبك في كل حالاتك.",
      "إنت أحن شخص على قلبي.",
      "كل يوم معاك ذكرى جديدة.",
      "بحبك حب ملوش آخر.",
      "إنت أجمل اختيار اختاره قلبي.",
      "معاك قلبي بيضحك.",
      "إنت دايمًا في بالي.",
      "بحبك أكتر من امبارح وأقل من بكرة.",
      "إنت سبب سعادتي البسيطة والكبيرة.",
      "وجودك في حياتي كفاية يخليني مبسوطة.",
      "إنت حبيبي وأقرب الناس ليا.",
      "أنا بحبك بطريقة محدش يعرفها غير قلبي.",
      "كل لحظة معاك بتتحفظ جوايا."
    ];

    const messageEnds = [
      "ربنا يخليك ليا دايمًا ❤️",
      "ويفضل حبنا يكبر يوم ورا يوم ❤️",
      "وأفضل دايمًا شايفة الدنيا أحلى بيك ❤️",
      "ومهما عدت الأيام، هتفضل أنت اختياري ❤️",
      "كل سنة وإنت حبيبي وفرحتي ❤️"
    ];

    function buildMessages() {
      const generatedMessages = [];

      for (let i = 0; i < messageStarts.length; i++) {
        for (let j = 0; j < messageEnds.length; j++) {
          generatedMessages.push(messageStarts[i] + " " + messageEnds[j]);
        }
      }

      return [...customMessages, ...generatedMessages].slice(0, 365);
    }

    const messages = buildMessages();

    function makeLocalDate(dateText) {
      const parts = dateText.split("-");
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function showTodayMessage() {
      const oneDay = 1000 * 60 * 60 * 24;
      const today = new Date();
      const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const start = makeLocalDate(startDate);

      const differenceInDays = Math.floor((todayOnly - start) / oneDay);

      if (differenceInDays < 0) {
        const daysLeft = Math.abs(differenceInDays);
        document.getElementById("dailyMessage").innerText =
          "أول رسالة هتبدأ يوم 7 يوليو 2026 💌";
        document.getElementById("dayCounter").innerText =
          "باقي " + daysLeft + " يوم على بداية الرسائل";
        return;
      }

      let dayNumber = differenceInDays + 1;

      if (dayNumber > 365) {
        dayNumber = 365;
      }

      document.getElementById("dailyMessage").innerText = messages[dayNumber - 1];
      document.getElementById("dayCounter").innerText =
        "اليوم رقم " + dayNumber + " من 365";
    }

    function toggleAllMessages() {
      const allMessagesDiv = document.getElementById("allMessages");

      if (allMessagesDiv.style.display === "block") {
        allMessagesDiv.style.display = "none";
        return;
      }

      allMessagesDiv.innerHTML = "";

      messages.forEach((message, index) => {
        const p = document.createElement("p");
        p.innerText = "اليوم " + (index + 1) + ": " + message;
        allMessagesDiv.appendChild(p);
      });

      allMessagesDiv.style.display = "block";
    }

    function loadPhotos() {
      const gallery = document.getElementById("gallery");
      const emptyPhotos = document.getElementById("emptyPhotos");

      if (photos.length === 0) {
        emptyPhotos.style.display = "block";
        return;
      }

      emptyPhotos.style.display = "none";

      photos.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo;
        img.alt = "صورة من ذكرياتنا";
        gallery.appendChild(img);
      });
    }

    showTodayMessage();
    loadPhotos();
  </script>

</body>
</html>
